# Single source of truth for parameters. Non-FIXED values are justified in DECISIONS.md.

build:
  dataset: deepmind/code_contests
  split: test                 # FIXED: test split = published post-2021-09-21 (contamination-clean)
  source_codeforces: 2        # CodeContests `source` enum value for Codeforces (has cf_rating/cf_tags)
  cpp_language: 2             # CodeContests `language` enum value for C++
  # build-time validation. Incorrects are FULLY validated: every incorrect is judged and only the
  # ones our sandbox confirms non-AC are kept (unexpected-AC ones are dropped). Corrects are judged
  # only until one judges AC (the judgeability gate) and are then stored unfiltered; if NO correct
  # judges AC the whole problem is deleted. Keep a problem only if it is judgeable (>= 1 AC correct)
  # AND yields >= min_incorrect confirmed-non-AC incorrects.
  min_correct: 1
  min_incorrect: 10
  workers: 18

execution:
  # GNU GCC (not Apple clang) for faithful 2021-era competitive C++ (bits/stdc++.h, GCC extensions)
  cpp_compiler: /opt/homebrew/bin/g++-16
  cpp_std: gnu++17
  time_margin_s: 1.0            # added to each test's time limit before TLE
  output_cap_bytes: 10000000    # stdout cap + RLIMIT_FSIZE
  default_time_limit_s: 2.0     # used if a problem has no time_limit
  default_memory_mb: 256
  first_failing_cap_chars: 6000 # truncate stored first_failing_test input/expected/actual

paths:
  data: data
  artifacts: artifacts
