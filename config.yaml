# Single source of truth for all pipeline parameters. Every script reads from here.
# FIXED values are pre-registered (RESEARCH_EXECUTION_PLAN.md Section 2); non-FIXED
# values are chosen here and justified in DECISIONS.md.

seed: 42

dataset:
  name: deepmind/code_contests          # FIXED
  split: test                           # FIXED (problems published after 2021-09-21)
  sensitivity_split: valid              # contamination probe only; never merged
  source_restriction: CODEFORCES        # main study = Codeforces-sourced (full cf_rating/cf_tags); Phase A.6

generator:                              # FIXED — contamination-critical
  model: gpt-3.5-turbo
  snapshot: gpt-3.5-turbo-0125
  temperature: 1.0                      # FIXED
  top_p: 1.0
  k_max: 16                             # non-FIXED (plan: 15-20); zero-shot samples per problem (single n=k_max call)
  min_non_ac_per_problem: 10            # FIXED
  max_tokens: 2048                      # non-FIXED; generation length cap; see DECISIONS.md
  shutdown_deadline: "2026-10-23"       # OpenAI gpt-3.5-turbo API shutdown

self_reflection:                        # FIXED
  n_iters: 5
  feedback: verdict_plus_one_failing_test

languages:                              # FIXED — C++ only (Section 2.2; no post-collection language step)
  collect: [cpp]
  primary: cpp

human_arm:
  cap_per_problem: 10                   # non-FIXED (mirror AI ~10); kept non-AC per problem
  max_judge_per_problem: 40             # non-FIXED; random sample judged per problem (rate + >=10 non-AC); see DECISIONS.md
  sample_seed: 20260627                 # FIXED for reproducible uniform sampling

judge:                                  # selected empirically in Phase F (not contamination-critical)
  slate:
    - gpt-5.5
    - claude-sonnet-4-6
  chosen: null                          # set after Phase F judge selection
  m: 5                                  # self-consistency samples (FIXED default; may drop to 3)
  provenance_blind: true                # FIXED

repair:                                 # Phase E.3 grounding
  model: gpt-5.5                        # non-FIXED; see DECISIONS.md
  attempts: 3                           # non-FIXED; see DECISIONS.md

difficulty_bins:                        # cf_rating bins; non-FIXED, finalized in Phase A; see DECISIONS.md
  edges: [1400, 1900, 2400]
  labels: [easy, medium, hard, expert]

gold:                                   # Cochran proportion sizing
  confidence: 0.95
  margin: 0.05
  p: 0.5

stats:                                  # FIXED at method level
  alpha: 0.05
  fdr_method: fdr_bh

prompt:
  size_cap_chars: 6000                  # head+tail truncation for description/tests; non-FIXED

execution:
  cpp_compiler: /opt/homebrew/bin/g++-16  # GNU GCC (not Apple clang) for faithful competitive C++ (bits/stdc++.h, GCC extensions)
  cpp_std: gnu++17                        # GNU extensions competitive code assumes; g++-11 unusable on this macOS (old SDK headers)
  time_margin_s: 1.0                    # added to problem time_limit
  default_time_limit_s: 2.0
  default_memory_mb: 256
  output_cap_bytes: 10000000

budget:
  max_usd: null                         # no budget ceiling (per user decision)

paths:
  data: data
  artifacts: artifacts
  results: results
  logs: logs
  human: human
  paper: paper
  cache: logs/cache
  llm_calls: logs/llm_calls
